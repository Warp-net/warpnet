services:
  business-node-testnet:
    container_name: business-node-testnet
    build:
      context: .
      dockerfile: Dockerfile.business
    network_mode: host
    environment:
      - NODE_PORT=4001
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SERVER_PORT=4888
      - NODE_SERVER_PASSWORD=MySecretPassword9000$
