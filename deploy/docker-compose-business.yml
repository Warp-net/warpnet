services:
  warpnet-business-testnet:
    container_name: business-testnet
    image: ghcr.io/warp-net/warpnet-business:latest
    # Host networking: a business node must be publicly addressable (no NAT) —
    # it asserts public reachability on startup and panics otherwise.
    network_mode: host
    restart: always
    environment:
      - NODE_PORT=4055
      - NODE_HOST_V4=207.154.221.44
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SEED=warpnet-business-testnet
      - NODE_BUSINESS_ENABLED=true
      - NODE_BUSINESS_HTTPPORT=7070
      # Drop the model path to run without moderation (engine stays idle).
      - NODE_MODERATOR_MODELPATH=/root/.warpdata/llama-2-7b-chat.Q8_0.gguf
      - CGO_CPPFLAGS="-DLLAMA_DISABLE_LOGS=1"
      - CGO_CXXFLAGS="-w -Wno-format -Wno-delete-incomplete"
      - NODE_METRICS_GATEWAY=130.94.88.38:4091
    volumes:
      - /root/.warpdata:/root/.warpdata:rw
