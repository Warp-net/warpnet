services:
  warpnet11:
    container_name: warpnet-testnet-1
    image: ghcr.io/warp-net/warpnet-bootstrap:latest
    network_mode: host
    restart: always
    environment:
      - NODE_PORT=4011
      - SOCKS5_PORT=4080
      - NODE_HOST_V4=207.154.221.44
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SEED=warpnet1
      - NODE_METRICS_GATEWAY=130.94.88.38:4091

  warpnet22:
    container_name: warpnet-testnet-2
    image: ghcr.io/warp-net/warpnet-bootstrap:latest
    network_mode: host
    restart: always
    environment:
      - NODE_PORT=4022
      - SOCKS5_PORT=4082
      - NODE_HOST_V4=207.154.221.44
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SEED=warpnet2
      - NODE_METRICS_GATEWAY=130.94.88.38:4091
      - SOCKS5_ENABLED=false

  warpnet33:
    container_name: warpnet-testnet-3
    image: ghcr.io/warp-net/warpnet-bootstrap:latest
    network_mode: host
    restart: always
    environment:
      - NODE_PORT=4033
      - SOCKS5_PORT=4083
      - NODE_HOST_V4=207.154.221.44
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SEED=warpnet3
      - NODE_METRICS_GATEWAY=130.94.88.38:4091
      - SOCKS5_ENABLED=false

  warpnet-moderator-testnet:
    container_name: moderator-testnet
    image: ghcr.io/warp-net/warpnet-moderator:latest
    network_mode: host
    restart: always
    environment:
      - NODE_PORT=4044
      - NODE_HOST_V4=207.154.221.44
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SEED=warpnet-moderator-testnet
      - CGO_CPPFLAGS="-DLLAMA_DISABLE_LOGS=1"
      - CGO_CXXFLAGS="-w -Wno-format -Wno-delete-incomplete"
      - NODE_METRICS_GATEWAY=130.94.88.38:4091
      - SOCKS5_ENABLED=false

    volumes:
      - /root/.warpdata:/root/.warpdata:rw


