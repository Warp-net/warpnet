services:
  warpnet:
    container_name: warpnet-testnet
    image: ghcr.io/warp-net/warpnet-bootstrap:latest
    network_mode: host
    restart: always
    environment:
      - NODE_PORT=4011
      - SOCKS5_PORT=4080
      - NODE_HOST_V4=207.154.221.44
      - NODE_NETWORK=testnet
      - LOGGING_LEVEL=info
      - LOGGING_FORMAT=json
      - NODE_SEED=warpnet1

