name: Build & Deploy Testnet

on:
  # push:
  #   branches:
  #     - develop
  workflow_dispatch:

jobs:
  build-relay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Relay Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.relay
          push: true
          tags: ghcr.io/warp-net/warpnet-relay:latest
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay

  build-moderator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Moderator Docker image
        id: docker_build_moderator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.moderator
          push: true
          tags: ghcr.io/warp-net/warpnet-moderator:latest
          cache-from: type=gha,scope=moderator
          cache-to: type=gha,mode=max,scope=moderator

  build-echo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Echo Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.echo
          push: true
          tags: ghcr.io/warp-net/warpnet-echo:latest
          cache-from: type=gha,scope=echo
          cache-to: type=gha,mode=max,scope=echo

  build-vadim:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Business Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.business
          push: true
          tags: ghcr.io/warp-net/warpnet-vadim:latest
          cache-from: type=gha,scope=business
          cache-to: type=gha,mode=max,scope=business

  deploy:
    runs-on: ubuntu-latest
    needs: [ build-relay, build-moderator, build-echo, build-vadim ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan -H 207.154.221.44 >> ~/.ssh/known_hosts
          ssh-keyscan -H 130.94.88.38 >> ~/.ssh/known_hosts

      - name: Deploy to Testnet DO Droplet
        run: |
          scp ./deploy/deploy.sh root@207.154.221.44:/root
          scp ./deploy/docker-compose-testnet.yml root@207.154.221.44:/root/docker-compose-testnet.yml
          ssh root@207.154.221.44 'GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} MAINNET=false bash /root/deploy.sh'

      - name: Deploy to Testnet Lightnode Droplet
        run: |
          scp ./deploy/deploy.sh root@130.94.88.38:/root
          scp ./deploy/docker-compose-testnet-ru.yml root@130.94.88.38:/root/docker-compose-testnet.yml
          ssh root@130.94.88.38 'GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} MAINNET=false bash /root/deploy.sh'




