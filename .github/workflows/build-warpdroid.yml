name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # services.gradle.org redirects to github.com/gradle/gradle-distributions,
      # which intermittently returns 504. The Gradle wrapper retries
      # immediately and gives up after one failure, so seed the wrapper's
      # cache ahead of time with curl, whose --retry-all-errors knows how to
      # ride out 5xx responses. The cache directory is the MD5-of-URL-in-base36
      # path the wrapper computes from gradle-wrapper.properties.
      - name: Pre-fetch Gradle distribution
        run: |
          set -euo pipefail
          cache_dir="$HOME/.gradle/wrapper/dists/gradle-9.0.0-bin/d6wjpkvcgsg3oed0qlfss3wgl"
          mkdir -p "$cache_dir"
          if [ -s "$cache_dir/gradle-9.0.0-bin.zip" ]; then
            echo "Gradle distribution already cached at $cache_dir."
            exit 0
          fi
          curl --fail --location --show-error \
            --retry 8 --retry-all-errors --retry-delay 15 \
            --connect-timeout 30 --max-time 300 \
            -o "$cache_dir/gradle-9.0.0-bin.zip" \
            https://services.gradle.org/distributions/gradle-9.0.0-bin.zip

      - name: Build debug
        id: build
        run: |
          set -o pipefail
          	./gradlew build -x test -x lint -x lintAnalyzeGreenDebug -x lintReportGreenDebug -x lintAnalyzeDebug -x lintReportDebug --stacktrace 2>&1 | tee assemble.log

      - name: Assemble debug APK
        id: assemble
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee assemble.log

      - name: Post build failure as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (path, bytes = 60000) => {
              if (!fs.existsSync(path)) return `(no ${path} produced)`;
              const stat = fs.statSync(path);
              const start = Math.max(0, stat.size - bytes);
              const fd = fs.openSync(path, 'r');
              const buf = Buffer.alloc(stat.size - start);
              fs.readSync(fd, buf, 0, buf.length, start);
              fs.closeSync(fd);
              return buf.toString('utf8');
            };
            const assembleLog = tail('assemble.log');
            const body = [
              `## CI build failure (\`${context.sha.substring(0, 7)}\`)`,
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '<details><summary><code>:app:assembleDebug</code> (last 60 KB)</summary>',
              '',
              '```',
              assembleLog,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
