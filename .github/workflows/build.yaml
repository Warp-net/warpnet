name: Build Mainnet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-relay:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.26
          cache-dependency-path: godep/go.sum

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Relay Docker image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.relay
          push: true
          tags: ghcr.io/warp-net/warpnet-relay:latest
          build-args: --dns 8.8.8.8

