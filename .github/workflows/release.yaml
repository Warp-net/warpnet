name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Specify a Git tag to process (e.g., v1.0.0)"
        required: true
        type: string

env:
  GO_VERSION: "1.26.0"
  RELEASE_TAG: ${{ github.event.inputs.tag }}
  CGO_ENABLED: "1"

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
          - os: macos-latest
            platform: darwin/universal
          - os: windows-latest
            platform: windows/amd64

    runs-on: ${{ matrix.os }}
    permissions:
      packages: write
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, fetch-tags: true }

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Linux deps
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt update
          sudo apt install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Build (Wails, Linux with compression)
        working-directory: cmd/node/member
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: wails build -clean -platform ${{ matrix.platform }} -tags webkit2_41 -m -nosyncgomod -upx -upxflags="--best"

      - name: Build Relay (Linux with compression)
        working-directory: cmd/node/relay
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: go build -ldflags "-s -w" -gcflags=all=-l -mod=vendor -o relay

      - name: Build (Wails)
        working-directory: cmd/node/member
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        run: wails build -clean -platform ${{ matrix.platform }} -tags webkit2_41 -m -nosyncgomod

      - name: Package + checksum (Linux AMD64)
        if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.platform == 'linux/amd64' }}
        run: |
          mkdir -p out/linux_amd64
          mv cmd/node/member/build/bin/* out/linux_amd64/warpnet
          tar -C out/linux_amd64 -czf warpnet_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz .
          shasum -a 256 warpnet_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz > warpnet_${{ env.RELEASE_TAG }}_linux_amd64_checksums.txt

      - name: Package Relay + checksum (Linux AMD64)
        if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.platform == 'linux/amd64' }}
        run: |
          mkdir -p out/relay_linux_amd64
          mv cmd/node/relay/relay out/relay_linux_amd64/relay
          tar -C out/relay_linux_amd64 -czf relay_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz .
          shasum -a 256 relay_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz > relay_${{ env.RELEASE_TAG }}_linux_amd64_checksums.txt

      - name: Package + checksum (Linux ARM64)
        if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.platform == 'linux/arm64' }}
        run: |
          mkdir -p out/linux_arm64
          mv cmd/node/member/build/bin/* out/linux_arm64/warpnet
          tar -C out/linux_arm64 -czf warpnet_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz .
          shasum -a 256 warpnet_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz > warpnet_${{ env.RELEASE_TAG }}_linux_arm64_checksums.txt

      - name: Package + checksum (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          mkdir -p out/darwin
          mv cmd/node/member/build/bin/* out/darwin/warpnet
          tar -C out/darwin -czf warpnet_${{ env.RELEASE_TAG }}_darwin.tar.gz .
          shasum -a 256 warpnet_${{ env.RELEASE_TAG }}_darwin.tar.gz > warpnet_${{ env.RELEASE_TAG }}_darwin_checksums.txt

      - name: Package + checksum (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out\windows_amd64 | Out-Null
          Move-Item cmd\node\member\build\bin\* out\windows_amd64\warpnet.exe
          Compress-Archive -Path out\windows_amd64\* -DestinationPath "warpnet_${{ env.RELEASE_TAG }}_windows_amd64.zip" -Force
          (Get-FileHash "warpnet_${{ env.RELEASE_TAG }}_windows_amd64.zip" -Algorithm SHA256).Hash + "  warpnet_${{ env.RELEASE_TAG }}_windows_amd64.zip" | Out-File -Encoding ASCII "warpnet_${{ env.RELEASE_TAG }}_windows_amd64_checksums.txt"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG || 'no_tag' }}
          name: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            relay_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz
            relay_${{ env.RELEASE_TAG }}_linux_amd64_checksums.txt
            warpnet_${{ env.RELEASE_TAG }}_linux_amd64.tar.gz
            warpnet_${{ env.RELEASE_TAG }}_linux_amd64_checksums.txt
            warpnet_${{ env.RELEASE_TAG }}_linux_arm64.tar.gz
            warpnet_${{ env.RELEASE_TAG }}_linux_arm64_checksums.txt
            warpnet_${{ env.RELEASE_TAG }}_darwin.tar.gz
            warpnet_${{ env.RELEASE_TAG }}_darwin_checksums.txt
            warpnet_${{ env.RELEASE_TAG }}_windows_amd64.zip
            warpnet_${{ env.RELEASE_TAG }}_windows_amd64_checksums.txt

  # APK release runs in parallel with the desktop matrix. Same tag
  # input — both jobs attach their artifacts to the same GitHub
  # Release. The same APK pipeline is also available standalone as
  # release-warpdroid.yaml for APK-only / quick-test releases.
  release-warpdroid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, fetch-tags: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: warpdroid

      # services.gradle.org redirects to github.com/gradle/gradle-distributions,
      # which intermittently returns 504. Same workaround as build-warpdroid.yml.
      - name: Pre-fetch Gradle distribution
        run: |
          set -euo pipefail
          cache_dir="$HOME/.gradle/wrapper/dists/gradle-9.0.0-bin/d6wjpkvcgsg3oed0qlfss3wgl"
          mkdir -p "$cache_dir"
          if [ -s "$cache_dir/gradle-9.0.0-bin.zip" ]; then
            echo "Gradle distribution already cached at $cache_dir."
            exit 0
          fi
          curl --fail --location --show-error \
            --retry 8 --retry-all-errors --retry-delay 15 \
            --connect-timeout 30 --max-time 300 \
            -o "$cache_dir/gradle-9.0.0-bin.zip" \
            https://services.gradle.org/distributions/gradle-9.0.0-bin.zip

      - name: Assemble debug APK
        working-directory: warpdroid
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Locate APK + checksum
        working-directory: warpdroid
        run: |
          set -euo pipefail
          # splits.abi produces one APK per ABI; ship arm64-v8a
          # (~99% of modern Android devices) as the release artifact.
          src=$(find app/build/outputs/apk/debug -name '*_arm64-v8a.apk' -type f | head -1)
          if [ -z "$src" ]; then
            echo "FATAL: no arm64-v8a APK produced" >&2
            ls -la app/build/outputs/apk/debug/ >&2 || true
            exit 1
          fi
          dst=warpdroid_${RELEASE_TAG}.apk
          cp "$src" "$dst"
          shasum -a 256 "$dst" > "warpdroid_${RELEASE_TAG}_checksums.txt"

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG || 'no_tag' }}
          name: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            warpdroid/warpdroid_${{ env.RELEASE_TAG }}.apk
            warpdroid/warpdroid_${{ env.RELEASE_TAG }}_checksums.txt
