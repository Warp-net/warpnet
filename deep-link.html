<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Open in Warpnet</title>
  <style>
    :root {
      --bg: #1b2636;
      --fg: #e7ecf3;
      --muted: #9aa5b6;
      --accent: #ff2d8e;
      --accent-fg: #fff;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f7f8fa; --fg: #1b2636; --muted: #4a5566; --card: #fff; --border: #e2e6ec; }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: grid; place-items: center; padding: 24px;
    }
    main {
      width: 100%; max-width: 480px;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: -0.01em; }
    p { margin: 0 0 14px; color: var(--muted); }
    p strong { color: var(--fg); }
    .user-id {
      display: inline-block; font: 13px/1 ui-monospace, SFMono-Regular, monospace;
      background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 6px;
      word-break: break-all;
    }
    .btn {
      display: block; width: 100%; padding: 12px 16px; margin: 8px 0;
      background: var(--accent); color: var(--accent-fg); text-decoration: none;
      text-align: center; font-weight: 600; font-size: 15px;
      border: none; border-radius: 10px; cursor: pointer;
    }
    .btn.ghost {
      background: transparent; color: var(--fg);
      border: 1px solid var(--border);
    }
    .btn:hover { filter: brightness(1.08); }
    .step { margin: 18px 0; }
    .hidden { display: none; }
    .footer-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; }
    iframe { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Opening Warpnet…</h1>
    <p id="initial-copy">
      Trying to open <span class="user-id" id="user-id-chip">…</span> in the Warpnet desktop app.
      If your browser shows a confirmation dialog, click <strong>Open Warpnet</strong>.
    </p>

    <div id="fallback" class="hidden">
      <div class="step">
        <p>If nothing happened, the Warpnet app may not be installed on this computer yet.</p>
      </div>
      <a class="btn" id="open-btn" href="#" rel="noopener">Open in Warpnet</a>
      <a class="btn ghost" id="download-btn" href="https://github.com/Warp-net/warpnet/releases/latest" rel="noopener">Download Warpnet</a>
      <p class="footer-note" id="download-hint">Available for Windows, macOS and Linux.</p>
    </div>
  </main>

  <iframe id="launcher" aria-hidden="true" tabindex="-1"></iframe>

  <script>
    (function () {
      'use strict';

      // ---------- 1. Extract the user id ---------------------------------
      // /user/{id} OR ?id=… as a fallback for static hosting that can't
      // rewrite paths. Tolerates trailing slashes.
      function parseUserId() {
        var pathMatch = location.pathname.match(/\/user\/([^\/?#]+)/i);
        if (pathMatch) return decodeURIComponent(pathMatch[1]);
        var params = new URLSearchParams(location.search);
        var q = params.get('id') || params.get('user');
        return q ? decodeURIComponent(q) : null;
      }

      var userId = parseUserId();
      var chip = document.getElementById('user-id-chip');
      if (!userId) {
        chip.textContent = 'unknown';
        document.getElementById('initial-copy').textContent =
          "We couldn't find a user id in this link. Use a link of the form warpnet.site/user/{id}.";
        document.getElementById('fallback').classList.remove('hidden');
        return;
      }
      chip.textContent = userId;

      var deepLink = 'warpnet://user/' + encodeURIComponent(userId);

      // ---------- 2. OS sniffing for the right installer -----------------
      // Best-effort: navigator.userAgentData when available (Chromium),
      // otherwise the legacy userAgent string. The Download button
      // defaults to the releases page; we just pre-fill which one is
      // probably the right one. Users still pick from the page if we
      // guess wrong.
      function pickDownloadHint() {
        var ua = navigator.userAgent || '';
        var platform = (navigator.userAgentData && navigator.userAgentData.platform) || '';
        var hint = document.getElementById('download-hint');
        if (/Win/i.test(platform) || /Windows/i.test(ua)) {
          hint.textContent = 'Download for Windows.';
        } else if (/Mac/i.test(platform) || /Mac OS X|Macintosh/i.test(ua)) {
          hint.textContent = 'Download for macOS.';
        } else if (/Linux/i.test(platform) || /Linux/i.test(ua)) {
          hint.textContent = 'Download for Linux.';
        } else if (/Android/i.test(ua)) {
          hint.textContent = 'On Android? Install the Warpnet app from the releases page.';
        } else if (/iPhone|iPad|iPod/i.test(ua)) {
          hint.textContent = 'iOS is not supported yet.';
        }
      }
      pickDownloadHint();

      // ---------- 3. Fire the deep link ----------------------------------
      // Hidden iframe avoids the "site can't be reached" page some
      // browsers show when location.href = 'warpnet://...' fails. The
      // browser still shows its own confirmation dialog when the scheme
      // is registered — that's the user-visible signal the app is
      // about to take over.
      function fireDeepLink() {
        try {
          document.getElementById('launcher').src = deepLink;
        } catch (e) {
          // Some browsers throw on unregistered schemes from iframes;
          // fall back to a top-level navigation.
          try { location.href = deepLink; } catch (_) {}
        }
      }

      // Some browsers (Safari, some Firefox versions) need a user
      // gesture before they'll route a custom scheme. We still trigger
      // once on load — if it works, great; if not, the Open button is
      // the explicit user-gesture retry.
      fireDeepLink();

      // ---------- 4. Decide whether to show the fallback -----------------
      // When the OS hands the link off to the app, the browser tab gets
      // backgrounded (visibilitychange fires, or the window loses
      // focus). If we don't see that within ~1.5s, assume the scheme
      // isn't registered and reveal the install/retry UI.
      var handedOff = false;
      function markHandedOff() { handedOff = true; }
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) markHandedOff();
      });
      window.addEventListener('blur', markHandedOff);
      window.addEventListener('pagehide', markHandedOff);

      setTimeout(function () {
        if (!handedOff) {
          document.getElementById('fallback').classList.remove('hidden');
        }
      }, 1500);

      // ---------- 5. Retry button ----------------------------------------
      document.getElementById('open-btn').addEventListener('click', function (e) {
        e.preventDefault();
        fireDeepLink();
      });
    })();
  </script>
</body>
</html>
